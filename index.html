<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Khazar Inji Hotel — Menyu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{--bg:#f7f5f2;--bg2:#fff;--bg3:#f0ede8;--border:#e8e2d9;--text:#1a1714;--text2:#6b6460;--text3:#9e9590;--gold:#b8860b;--gold-bg:#fdf8ef;--gold-border:#e8d5a0;--shadow:rgba(0,0,0,0.08);--shadow2:rgba(0,0,0,0.14);--header:rgba(255,255,255,0.96);--tab-bg:#b8860b;--tab-text:#fff;--overlay:rgba(0,0,0,0.5);--badge-bg:#e8f5e9;--badge-text:#2e7d32}
[data-theme="dark"]{--bg:#0f0d0b;--bg2:#1a1714;--bg3:#242018;--border:#2e2820;--text:#f0ebe3;--text2:#a09080;--text3:#6b5e50;--gold:#d4a843;--gold-bg:#1e1a0f;--gold-border:#3a3018;--shadow:rgba(0,0,0,0.3);--shadow2:rgba(0,0,0,0.5);--header:rgba(15,13,11,0.97);--tab-bg:#d4a843;--tab-text:#0f0d0b;--overlay:rgba(0,0,0,0.75);--badge-bg:#1a2e1a;--badge-text:#66bb6a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--header);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
.header-top{display:flex;align-items:center;gap:10px;padding:12px 16px}
.back-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:16px;transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}
.logo-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo-circle{width:38px;height:38px;border-radius:50%;background:var(--gold-bg);border:1.5px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);font-weight:700;flex-shrink:0;overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-text h1{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.logo-text p{font-size:10px;color:var(--text3);letter-spacing:.5px}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:15px;transition:all .2s;position:relative;flex-shrink:0}
.icon-btn:hover{border-color:var(--gold)}
.lang-flag{width:20px;height:20px;border-radius:50%;object-fit:cover}
/* SEARCH */
.search-bar{padding:0 16px 12px;display:flex;align-items:center}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.s-icon{position:absolute;left:12px;color:var(--text3);font-size:14px;pointer-events:none}
.search-in{width:100%;height:40px;background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;padding:0 16px 0 38px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s}
.search-in::placeholder{color:var(--text3)}
.search-in:focus{border-color:var(--gold);background:var(--bg2)}
/* CATS */
.cat-nav{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;border-top:1px solid var(--border);background:var(--header)}
.cat-nav::-webkit-scrollbar{display:none}
.cat-tab{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.cat-tab:hover{border-color:var(--gold);color:var(--gold)}
.cat-tab.active{background:var(--tab-bg);border-color:var(--tab-bg);color:var(--tab-text);font-weight:600}
/* QUICK */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 0}
.quick-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.quick-card:hover{border-color:var(--gold)}
.qc-icon{font-size:22px;flex-shrink:0}
.qc-label{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.qc-sub{font-size:10px;color:var(--text3);margin-top:1px}
/* NOTICE */
.notice{margin:10px 16px;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:10px;padding:9px 14px;font-size:12px;color:var(--gold);display:flex;align-items:center;gap:6px}
/* MENU */
.menu-wrap{padding:16px;padding-bottom:100px;max-width:800px;margin:0 auto}
.sec-title{display:flex;align-items:center;gap:8px;margin:24px 0 14px;scroll-margin-top:180px}
.sec-title:first-child{margin-top:0}
.sec-title h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text)}
.sec-count{background:var(--bg3);color:var(--text3);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
/* GRID */
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:500px){.items-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.items-grid{grid-template-columns:repeat(4,1fr)}}
/* CARD */
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px var(--shadow);display:flex;flex-direction:column;animation:fadeUp .3s ease both}
.m-card:hover{box-shadow:0 4px 16px var(--shadow2);transform:translateY(-1px);border-color:var(--gold-border)}
.m-card.wide{grid-column:1/-1;flex-direction:row;align-items:center}
@media(min-width:700px){.m-card.wide{grid-column:auto;flex-direction:column}}
.card-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);position:relative}
.m-card.wide .card-img-wrap{width:80px;height:80px;aspect-ratio:auto;border-radius:10px;margin:10px;flex-shrink:0}
@media(min-width:700px){.m-card.wide .card-img-wrap{width:100%;aspect-ratio:4/3;margin:0;border-radius:0}}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.m-card:hover .card-img{transform:scale(1.04)}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.35}
.card-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column}
.m-card.wide .card-body{padding:12px 12px 12px 4px}
@media(min-width:700px){.m-card.wide .card-body{padding:10px 10px 8px}}
.card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:11px;color:var(--text3);margin-bottom:8px}
.card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-price{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--gold)}
.add-btn{width:28px;height:28px;border-radius:50%;background:var(--gold);border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;box-shadow:0 2px 8px rgba(184,134,11,.35)}
.add-btn:hover{transform:scale(1.1)}
.add-btn:active{transform:scale(.95)}
.add-btn.in{background:var(--badge-text)}
/* NO RESULTS */
.no-res{text-align:center;padding:60px 20px;color:var(--text3)}
.no-res .nr-ic{font-size:48px;margin-bottom:12px}
/* CART BAR */
.cart-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(120px);width:calc(100% - 32px);max-width:560px;background:var(--text);color:var(--bg);border:none;border-radius:14px;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;box-shadow:0 8px 30px var(--shadow2);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:90}
.cart-bar.vis{transform:translateX(-50%) translateY(0)}
.cb-left{display:flex;align-items:center;gap:10px}
.cb-badge{background:var(--gold);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.cb-total{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold)}
/* OVERLAY + SHEET */
.overlay{position:fixed;inset:0;background:var(--overlay);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.bsheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.2,.64,1)}
.bsheet.open{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
/* ITEM SHEET */
.is-img{width:100%;height:240px;object-fit:cover}
.is-body{padding:20px}
.is-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.2}
.is-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.is-price{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);font-weight:700;margin-bottom:20px}
.qty-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:20px}
.qty-ctrl{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-ctrl:hover{border-color:var(--gold);color:var(--gold)}
.qty-val{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);min-width:40px;text-align:center}
.main-btn{width:100%;height:52px;border-radius:14px;background:var(--gold);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;letter-spacing:.3px;transition:opacity .2s;box-shadow:0 4px 16px rgba(184,134,11,.4)}
.main-btn:hover{opacity:.9}
/* CART SHEET */
.cs-body{padding:20px}
.cs-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ci-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-img{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--border)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.ci-unit{font-size:12px;color:var(--text3)}
.ci-ctrl{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cq-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cq-btn:hover{border-color:var(--gold);color:var(--gold)}
.cq-btn.del:hover{border-color:#e05555;color:#e05555}
.ci-qty{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.ci-price{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);font-weight:600}
.cart-empty{text-align:center;padding:40px 20px;color:var(--text3)}
.cart-empty .icon{font-size:48px;margin-bottom:12px}
.cs-summary{background:var(--bg3);border-radius:12px;padding:14px 16px;margin:16px 0;border:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.sum-row span:first-child{font-size:13px;color:var(--text2)}
.sum-row span:last-child{font-size:14px;font-weight:500;color:var(--text)}
.sum-row.tot span{font-size:15px;font-weight:700}
.sum-row.tot span:last-child{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold)}
.sum-div{height:1px;background:var(--border);margin:8px 0}
.field-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.field-in{width:100%;height:46px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:10px}
.field-in:focus{border-color:var(--gold)}
.table-det{display:flex;align-items:center;gap:8px;background:var(--badge-bg);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--badge-text);font-weight:500}
.note-in{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;resize:none;transition:border-color .2s;margin-bottom:14px}
.note-in:focus{border-color:var(--gold)}
.note-in::placeholder{color:var(--text3)}
/* SUCCESS */
.success-sc{text-align:center;padding:40px 24px 30px}
.suc-icon{font-size:64px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.7,.64,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.suc-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);margin-bottom:10px}
.suc-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px}
/* LANG DD */
.lang-dd{position:absolute;top:44px;right:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 8px 24px var(--shadow2);z-index:300;display:none;min-width:140px}
.lang-dd.open{display:block}
.lang-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:background .15s}
.lang-opt:hover{background:var(--bg3)}
.lang-opt.act{color:var(--gold);font-weight:600}
/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) scale(.8);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px var(--shadow2)}
.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="logo-wrap">
      <div class="logo-circle">
        <img src="https://monyo.az/v4/uploads/a_1203_logo.png" alt="KI" onerror="this.style.display='none';this.parentElement.textContent='KI'">
      </div>
      <div class="logo-text">
        <h1>Khazar Inji Hotel</h1>
        <p>Bakı, Buzovna</p>
      </div>
    </div>
    <div class="hdr-actions">
      <div class="icon-btn" id="langBtn" onclick="toggleLang(event)">
        <img class="lang-flag" id="langFlag" src="https://flagcdn.com/w40/az.png" alt="AZ">
        <div class="lang-dd" id="langDd">
          <div class="lang-opt act" onclick="setLang('az','https://flagcdn.com/w40/az.png')"><img class="lang-flag" src="https://flagcdn.com/w40/az.png"> Azərbaycanca</div>
          <div class="lang-opt" onclick="setLang('en','https://flagcdn.com/w40/gb.png')"><img class="lang-flag" src="https://flagcdn.com/w40/gb.png"> English</div>
          <div class="lang-opt" onclick="setLang('ru','https://flagcdn.com/w40/ru.png')"><img class="lang-flag" src="https://flagcdn.com/w40/ru.png"> Русский</div>
        </div>
      </div>
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Tema">🌙</div>
    </div>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input class="search-in" type="text" id="searchIn" placeholder="Məhsul axtar..." oninput="onSearch()">
    </div>
  </div>
  <div class="cat-nav" id="catNav"></div>
</header>

<!-- QUICK ACTIONS -->
<div class="quick-actions">
  <div class="quick-card" onclick="showToast('Ofisiant çağırıldı 🛎️')">
    <span class="qc-icon">🛎️</span>
    <div><div class="qc-label">Ofisiant çağır</div><div class="qc-sub">İşçilərdən kömək</div></div>
  </div>
  <div class="quick-card" onclick="showToast('Hesabınız hazırlanır 🧾')">
    <span class="qc-icon">🧾</span>
    <div><div class="qc-label">Hesabı ödə</div><div class="qc-sub">Sürətli ödəniş</div></div>
  </div>
</div>

<div class="notice">⚠️ Hesabınıza 10% xidmət haqqı əlavə olunacaq</div>

<div class="menu-wrap" id="menuWrap"></div>

<button class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cb-left"><div class="cb-badge" id="cbQty">0</div><span>Sifarişə bax</span></div>
  <span class="cb-total" id="cbTotal">0.00 ₼</span>
</button>

<!-- ITEM SHEET -->
<div class="overlay" id="iOvr" onclick="closeItem()"></div>
<div class="bsheet" id="iSheet"><div class="sh-handle"></div><div id="iContent"></div></div>

<!-- CART SHEET -->
<div class="overlay" id="cOvr" onclick="closeCart()"></div>
<div class="bsheet" id="cSheet"><div class="sh-handle"></div><div class="cs-body" id="cContent"></div></div>

<script>
// DATA
const CATS=[
  {id:'setler',name:'Setlər',icon:'🎁'},{id:'gin',name:'Gin',icon:'🍸'},
  {id:'pastalar',name:'Pastalar',icon:'🍝'},{id:'steykler',name:'Steyklər',icon:'🥩'},
  {id:'souslar',name:'Souslar',icon:'🫙'},{id:'soyuq',name:'Soyuq Qəlyanaltı',icon:'🥗'},
  {id:'isti',name:'İsti Qəlyanaltı',icon:'🍳'},{id:'salatlar',name:'Salatlar',icon:'🥙'},
  {id:'sorbalar',name:'Şorbalar',icon:'🍲'},{id:'toyuq',name:'Toyuq',icon:'🍗'},
  {id:'et',name:'Ət Yeməkləri',icon:'🥩'},{id:'qarnirlər',name:'Qarnirlər',icon:'🥔'},
  {id:'baliq',name:'Balıq',icon:'🐟'},{id:'saclar',name:'Saclar',icon:'🫕'},
  {id:'kabablar',name:'Kabablar',icon:'🔥'},{id:'sendvicler',name:'Sendviçlər',icon:'🍔'},
  {id:'pizzalar',name:'Pizzalar',icon:'🍕'},{id:'meyveler',name:'Meyvələr',icon:'🍇'},
  {id:'desertler',name:'Desertlər',icon:'🍰'},{id:'isti-ickilər',name:'İsti İçkilər',icon:'☕'},
  {id:'meyvə-sulari',name:'Meyvə Suları',icon:'🥤'},{id:'alkoqolsuz',name:'Alkoqolsuz Kokteyller',icon:'🍹'},
  {id:'alkoqollu',name:'Alkoqollu Kokteyller',icon:'🍸'},{id:'serinlesdirici',name:'Sərinləşdiricilər',icon:'🥤'},
  {id:'piveler',name:'Pivələr',icon:'🍺'},{id:'araqlar',name:'Araqlar',icon:'🥃'},
  {id:'serablar',name:'Şərablar',icon:'🍷'},{id:'tekila',name:'Tekila',icon:'🥃'},
  {id:'viskiler',name:'Viskillər',icon:'🥃'},{id:'rom',name:'Rom',icon:'🥃'},
  {id:'konyak',name:'Konyak',icon:'🥃'},{id:'sampan',name:'Şampan',icon:'🍾'},
  {id:'martini',name:'Martini',icon:'🍸'},{id:'likor',name:'Likor',icon:'🍹'},
  {id:'qelyanlar',name:'Qəlyanlar',icon:'💨'}
];
const ITEMS={

// STATE
let cart=[],activeCat='all',curItem=null,itemQty=1;

// THEME
let dark=false;
function toggleTheme(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'light');document.getElementById('themeBtn').textContent=dark?'☀️':'🌙'}

// LANG
function toggleLang(e){e.stopPropagation();document.getElementById('langDd').classList.toggle('open')}
function setLang(l,f){document.getElementById('langFlag').src=f;document.getElementById('langDd').classList.remove('open');document.getElementById('searchIn').placeholder=l==='az'?'Məhsul axtar...':l==='ru'?'Поиск...':'Search...'}
document.addEventListener('click',()=>document.getElementById('langDd').classList.remove('open'));

// CAT NAV
function renderCatNav(){
  const nav=document.getElementById('catNav');
  nav.innerHTML=`<div class="cat-tab ${activeCat==='all'?'active':''}" onclick="setCat('all')">🍽️ Hamısı</div>`;
  CATS.forEach(c=>{if(!(ITEMS[c.id]||[]).length)return;nav.innerHTML+=`<div class="cat-tab ${activeCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.icon} ${c.name}</div>`});
}

function setCat(id){activeCat=id;renderCatNav();renderMenu();if(id!=='all'){setTimeout(()=>{const el=document.getElementById('s-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80)}else window.scrollTo({top:0,behavior:'smooth'})}

// MENU
function renderMenu(f=''){
  const wrap=document.getElementById('menuWrap');
  let html='',any=false;
  CATS.forEach((cat,ci)=>{
    if(activeCat!=='all'&&activeCat!==cat.id)return;
    let items=(ITEMS[cat.id]||[]);
    if(f)items=items.filter(i=>i.name.toLowerCase().includes(f.toLowerCase()));
    if(!items.length)return;
    any=true;
    html+=`<div class="sec-title" id="s-${cat.id}"><h2>${cat.icon} ${cat.name}</h2><span class="sec-count">${items.length}</span></div><div class="items-grid">`;
    items.forEach((item,i)=>{
      const delay=Math.min(i*40,300);
      const inCart=cart.find(c=>c.id===item.id);
      if(item.img){
        html+=`<div class="m-card" style="animation-delay:${delay}ms" onclick="openItem('${cat.id}','${item.id}')">
          <div class="card-img-wrap"><img class="card-img" src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-ph\\'>${cat.icon}</div>'"></div>
          <div class="card-body">
            <div class="card-name">${item.name}</div>
            ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
            <div class="card-bot"><span class="card-price">${item.price} ₼</span><button class="add-btn ${inCart?'in':''}" onclick="event.stopPropagation();qAdd('${cat.id}','${item.id}',this)">+</button></div>
          </div></div>`;
      }else{
        html+=`<div class="m-card wide" style="animation-delay:${delay}ms" onclick="openItem('${cat.id}','${item.id}')">
          <div class="card-img-wrap"><div class="card-ph">${cat.icon}</div></div>
          <div class="card-body">
            <div class="card-name">${item.name}</div>
            ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
            <div class="card-bot"><span class="card-price">${item.price} ₼</span><button class="add-btn ${inCart?'in':''}" onclick="event.stopPropagation();qAdd('${cat.id}','${item.id}',this)">+</button></div>
          </div></div>`;
      }
    });
    html+='</div>';
  });
  if(!any)html=`<div class="no-res"><div class="nr-ic">🔍</div><p>Nəticə tapılmadı</p></div>`;
  wrap.innerHTML=html;
}

function onSearch(){const v=document.getElementById('searchIn').value.trim();if(v){activeCat='all';renderCatNav()}renderMenu(v)}

// ITEM SHEET
function openItem(cid,iid){
  const cat=CATS.find(c=>c.id===cid);const item=(ITEMS[cid]||[]).find(i=>i.id===iid);
  if(!item||!cat)return;curItem={...item,cid,icon:cat.icon};itemQty=1;renderItemSheet();
  document.getElementById('iOvr').classList.add('open');document.getElementById('iSheet').classList.add('open');document.body.style.overflow='hidden';
}
function renderItemSheet(){
  const item=curItem;const tot=(item.price*itemQty).toFixed(2);
  document.getElementById('iContent').innerHTML=`
    ${item.img?`<img class="is-img" src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">`:''}
    <div class="is-body">
      <div class="is-name">${item.name}</div>
      ${item.desc?`<div class="is-desc">${item.desc}</div>`:''}
      <div class="is-price">${tot} ₼</div>
      <div class="qty-row">
        <button class="qty-ctrl" onclick="chQty(-1)">−</button>
        <span class="qty-val">${itemQty}</span>
        <button class="qty-ctrl" onclick="chQty(1)">+</button>
      </div>
      <button class="main-btn" onclick="addCart()">Səbətə əlavə et — ${tot} ₼</button>
    </div>`;
}
function chQty(d){itemQty=Math.max(1,itemQty+d);renderItemSheet()}
function closeItem(){document.getElementById('iOvr').classList.remove('open');document.getElementById('iSheet').classList.remove('open');document.body.style.overflow=''}
function qAdd(cid,iid,btn){const cat=CATS.find(c=>c.id===cid);const item=(ITEMS[cid]||[]).find(i=>i.id===iid);if(!item)return;pushCart(item,1);btn.classList.add('in');showToast('✓ '+item.name)}
function addCart(){if(!curItem)return;pushCart(curItem,itemQty);closeItem();showToast('✓ '+curItem.name+' əlavə edildi')}
function pushCart(item,qty){const ex=cart.find(c=>c.id===item.id);if(ex)ex.qty+=qty;else cart.push({...item,qty});updCartBar()}
function updCartBar(){
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0);const qty=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cbTotal').textContent=tot.toFixed(2)+' ₼';
  document.getElementById('cbQty').textContent=qty;
  document.getElementById('cartBar').classList.toggle('vis',cart.length>0);
}

// CART SHEET
function openCart(){renderCart();document.getElementById('cOvr').classList.add('open');document.getElementById('cSheet').classList.add('open');document.body.style.overflow='hidden'}
function closeCart(){document.getElementById('cOvr').classList.remove('open');document.getElementById('cSheet').classList.remove('open');document.body.style.overflow=''}
function renderCart(success=false){
  if(success){
    document.getElementById('cContent').innerHTML=`<div class="success-sc"><div class="suc-icon">✅</div><div class="suc-title">Sifarişiniz qəbul edildi!</div><div class="suc-sub">Zəhmət olmasa gözləyin,<br>ofisiant tezliklə yanınıza gələcək.</div><button class="main-btn" onclick="closeCart()">Menyuya qayıt</button></div>`;
    return;
  }
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0);const svc=tot*.1;const grand=tot+svc;
  let rows='';
  if(!cart.length){rows=`<div class="cart-empty"><div class="icon">🛒</div><p>Səbət boşdur</p></div>`}
  else{
    cart.forEach((item,idx)=>{
      const imgEl=item.img?`<img class="ci-img" src="${item.img}" alt="" onerror="this.outerHTML='<div class=\\'ci-img\\'>${item.icon||'🍽️'}</div>'">`:`<div class="ci-img" style="display:flex;align-items:center;justify-content:center;font-size:22px">${item.icon||'🍽️'}</div>`;
      rows+=`<div class="ci-row">${imgEl}<div class="ci-info"><div class="ci-name">${item.name}</div><div class="ci-unit">${item.price} ₼ × ${item.qty}</div></div><div class="ci-ctrl"><button class="cq-btn del" onclick="chCart(${idx},-1)">−</button><span class="ci-qty">${item.qty}</span><button class="cq-btn" onclick="chCart(${idx},1)">+</button></div><span class="ci-price">${(item.price*item.qty).toFixed(2)} ₼</span></div>`;
    });
  }
  const tableEl='';
  document.getElementById('cContent').innerHTML=`
    <div class="cs-title">🛒 Sifarişim</div>${rows}
    ${cart.length?`<div class="cs-summary">
      <div class="sum-row"><span>Məhsullar</span><span>${tot.toFixed(2)} ₼</span></div>
      <div class="sum-row"><span>Xidmət haqqı (10%)</span><span>${svc.toFixed(2)} ₼</span></div>
      <div class="sum-div"></div>
      <div class="sum-row tot"><span>Cəmi</span><span>${grand.toFixed(2)} ₼</span></div>
    </div>
    ${tableEl}
    <label class="field-label" style="margin-top:8px">Qeyd (istəyə görə)</label>
    <textarea class="note-in" id="noteIn" rows="2" placeholder="Əlavə istəklər..."></textarea>
    <button class="main-btn" onclick="submitOrder()">Sifarişi Təsdiqlə — ${grand.toFixed(2)} ₼</button>`:''}`;
}
function chCart(idx,d){cart[idx].qty=Math.max(0,cart[idx].qty+d);if(cart[idx].qty===0)cart.splice(idx,1);updCartBar();renderCart()}
function submitOrder(){
  cart=[];updCartBar();renderCart(true);
}

// TOAST
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// INIT
renderCatNav();renderMenu();
</script>
